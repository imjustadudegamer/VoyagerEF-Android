// ===== Voyager EF — Android ONE-TIME defaults =====
// Applied exactly once (engine: Com_ExecuteCfg, guarded by in_androidDefaults).
// After first boot, everything here is owned by hmconfig.cfg — users can
// change any of it in the settings menus and their choices persist.
seta sv_pure 0

// ---- Resolution: -2 = native device resolution; aspect via Video menu ----
seta r_mode -2
seta r_fullscreen 1

// ---- Gamepad (SDL GameController). The gamepad path delivers axes in the
//      +/-32767 range; j_forward/j_side act as direct scale onto the +/-127
//      move range, so 127/32767 = 0.0039 gives true analog movement across
//      the whole stick throw (0.25 saturated to full run at ~16% deflection,
//      which made the left stick feel like an on/off switch). ----
seta in_joystick 1
seta in_joystickUseAnalog 1
seta joy_threshold 0.15
seta j_forward -0.004
seta j_side    0.004
// Look (right stick): viewangle deg/ms per axis unit; axes are +/-32767, so
// full deflection = j * 32767 * 1000 deg/sec. 0.0075 ~= 245 deg/s yaw,
// 0.0055 ~= 180 deg/s pitch (console-FPS feel). The old 0.20/0.22 values were
// for the +/-127 legacy joystick range -> ~7000 deg/s = instant spinning.
seta j_pitch   0.0055
seta j_yaw    -0.0075

// ---- Dual-analog FPS binds (SDL GameController PAD0_* names).
//      Rebindable in CONTROLS settings; this is only the first-boot default. ----
bind PAD0_LEFTSTICK_UP     "+forward"
bind PAD0_LEFTSTICK_DOWN   "+back"
bind PAD0_LEFTSTICK_LEFT   "+moveleft"
bind PAD0_LEFTSTICK_RIGHT  "+moveright"
bind PAD0_RIGHTSTICK_UP    "+lookup"
bind PAD0_RIGHTSTICK_DOWN  "+lookdown"
bind PAD0_RIGHTSTICK_LEFT  "+left"
bind PAD0_RIGHTSTICK_RIGHT "+right"
bind PAD0_RIGHTTRIGGER     "+attack"
bind PAD0_LEFTTRIGGER      "+altattack"
bind PAD0_RIGHTSHOULDER    "weapnext"
bind PAD0_LEFTSHOULDER     "weapprev"
bind PAD0_A                "+moveup"
bind PAD0_B                "+movedown"
bind PAD0_X                "+altattack"
bind PAD0_Y                "weapnext"
bind PAD0_RIGHTSTICK_CLICK "+zoom"
bind PAD0_DPAD_UP          "+button2"     // use holdable item
bind PAD0_DPAD_DOWN        "+button3"     // gesture/taunt
bind PAD0_DPAD_LEFT        "weapprev"
bind PAD0_DPAD_RIGHT       "weapnext"
bind PAD0_START            "togglemenu"
bind PAD0_BACK             "+info"      // scoreboard (EF's name for Q3's +scores)

// ---- MAX GRAPHICS (Vulkan renderervk; changeable in the Video menu) ----
seta r_picmip 0
seta r_subdivisions 4
seta r_lodbias 0
seta r_ext_texture_filter_anisotropic 1
seta r_ext_max_anisotropy 16
seta r_textureMode "GL_LINEAR_MIPMAP_LINEAR"
seta r_ext_multisample 4
seta r_dlightMode 1
seta r_fbo 1
seta r_bloom 1
seta r_bloom_intensity 0.3
seta r_bloom_threshold 0.8
seta r_overBrightBits 0
seta r_mapOverBrightBits 0
seta cg_drawfps 0
seta cg_drawFPS 0
seta cg_drawgun 1
seta r_swapInterval 0
seta com_maxfps 120
seta r_finish 0
seta r_intensity 1.0
seta r_depthPrepass 0

// ---- Master servers for the in-game browser ----
seta sv_master1 "master.hazardmodding.com"
seta sv_master2 "51.75.78.236"
seta sv_master3 ""
seta sv_master4 ""
seta sv_master5 ""

// skip the CD-key entry screen (abandonware; no key servers)
seta ui_cdkeychecked 1
seta ui_cdkeychecked2 1
seta ui_cdkey "1111111111111111"
seta ui_browserMaster 1
seta ui_initialsetup 1
